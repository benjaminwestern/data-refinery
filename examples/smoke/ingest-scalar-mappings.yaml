files:
  - match:
      name: contacts.csv
      format: csv
    columns:
      customer_id: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
  - match:
      name: contacts.tsv
      format: tsv
    columns:
      customer_id: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
  - match:
      name: contacts.xlsx
      format: xlsx
    columns:
      customer_id: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
  - match:
      name: contacts.xml
      format: xml
    xmlRecordPath: contacts.contact
    columns:
      member.identifier: Id
      profile.first_name: FirstName
      profile.last_name: LastName
      profile.email: Email
      contact_details.mobile: Mobile
      contact_details.postcode: PostCode
      source: DataSource
  - match:
      name: contacts.json
      format: json
    columns:
      identifier: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
  - match:
      name: contacts.jsonl
      format: jsonl
    columns:
      member_id: Id
      profile.first_name: FirstName
      profile.last_name: LastName
      profile.email: Email
      contact.mobile: Mobile
      contact.postcode: PostCode
      source: DataSource
