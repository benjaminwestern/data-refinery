files:
  - match:
      name: contacts.csv
      format: csv
    columns:
      customer_id: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
    attributes:
      status: SubscriptionStatus
    dataSource: smoke-csv
  - match:
      name: contacts.tsv
      format: tsv
    columns:
      customer_id: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
    attributes:
      status: SubscriptionStatus
    dataSource: smoke-tsv
  - match:
      name: contacts.json
      format: json
    columns:
      identifier: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
    attributes:
      status: SubscriptionStatus
  - match:
      name: contacts.xml
      format: xml
    xmlRecordPath: contacts.contact
    columns:
      identifier: Id
      first_name: FirstName
      last_name: LastName
      email: Email
      mobile: Mobile
      postcode: PostCode
      source: DataSource
    attributes:
      status: SubscriptionStatus
